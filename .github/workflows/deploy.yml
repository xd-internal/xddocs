name: Deploy Docusaurus to GitHub Pages

on:
  # Deploy only when changes land on the main branch (direct push or merged PR)
  push:
    branches:
      - main

  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions needed to publish Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; skip queued runs but never cancel an in-progress one
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  build:
    name: Build Docusaurus site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history lets Docusaurus show "last updated" dates

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm              # Change to "yarn" or "pnpm" if you use those

      - name: Install dependencies
        run: npm ci               # Use "yarn install --frozen-lockfile" or "pnpm install --frozen-lockfile" if needed

      - name: Build site
        run: npm run build        # Outputs to ./build by default

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build           # Docusaurus default; adjust if you changed outDir in docusaurus.config.js

  # ── 2. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    # The environment provides the live URL in the Actions UI
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
